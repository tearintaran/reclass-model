# Local / staging stack for ReClass API + PostgreSQL
#
# Usage (from ReClass Model/):
#   docker compose -f deploy/docker-compose.yml up --build
#
# Reviewer UI: http://localhost:8000/reviewer/
# API health:  http://localhost:8000/health

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: reclass
      POSTGRES_PASSWORD: reclass_dev
      POSTGRES_DB: reclass_dev
    ports:
      - "5432:5432"
    volumes:
      - reclass_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reclass -d reclass_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      RECLASS_API_ENV: development
      RECLASS_DB: reclass_dev
      RECLASS_AUDIT_BACKEND: db
      RECLASS_JWT_SECRET: dev-secret-change-in-production
      DATABASE_URL: postgresql://reclass:reclass_dev@db:5432/reclass_dev
      PGHOST: db
      PGUSER: reclass
      PGPASSWORD: reclass_dev
      PGDATABASE: reclass_dev
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python db/apply.py reclass_dev &&
             python -m uvicorn api.app:app --host 0.0.0.0 --port 8000"

volumes:
  reclass_pgdata:
